<a href="/">
  {{ $img := resources.Get "images/face.jpeg" }}
  {{ $lowRes := $img.Resize "150x webp" }} 
  <img id="logo"
       src="{{ $lowRes.RelPermalink }}"
       width="{{ $img.Width }}"
       height="{{ $img.Height }}"
       alt="A picture of my face"
       fetchpriority="high"
       loading="eager">
</a>

<h1>
  <a href="/">{{ .Site.Title }}</a>
</h1>
<nav>
  <div id="horizontal-nav">
  {{ partial "nav.html" . }}
  </div>
</nav>
<div id="vertical-nav">
  <details>
    <summary>
    </summary>
    {{ partial "nav.html" .}}
  </details>
</div>
